AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Spookfish.ai - Real-time aircraft proximity tracker

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name

  DomainName:
    Type: String
    Default: spookfish.ai
    Description: Domain name for the application

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.11
    Architectures:
      - x86_64
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        USER_PREFERENCES_TABLE: !Ref UserPreferencesTable
        USER_LOCATIONS_TABLE: !Ref UserLocationsTable

Resources:
  # ============================================================================
  # Cognito User Pool for Authentication
  # ============================================================================

  SpookfishUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub spookfish-users-${Environment}
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: false
        - Name: name
          AttributeDataType: String
          Required: false
          Mutable: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      UserPoolTags:
        Project: Spookfish
        Environment: !Ref Environment

  SpookfishUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub spookfish-client-${Environment}
      UserPoolId: !Ref SpookfishUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED
      RefreshTokenValidity: 30
      AccessTokenValidity: 1
      IdTokenValidity: 1
      TokenValidityUnits:
        RefreshToken: days
        AccessToken: hours
        IdToken: hours

  # ============================================================================
  # DynamoDB Tables
  # ============================================================================

  UserPreferencesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub spookfish-user-preferences-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: cognitoSub
          AttributeType: S
      KeySchema:
        - AttributeName: cognitoSub
          KeyType: HASH
      Tags:
        - Key: Project
          Value: Spookfish
        - Key: Environment
          Value: !Ref Environment

  UserLocationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub spookfish-user-locations-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: cognitoSub
          AttributeType: S
        - AttributeName: locationId
          AttributeType: S
      KeySchema:
        - AttributeName: cognitoSub
          KeyType: HASH
        - AttributeName: locationId
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: Spookfish
        - Key: Environment
          Value: !Ref Environment

  # ============================================================================
  # Lambda Functions
  # ============================================================================

  # Lambda Layer for shared Python dependencies
  FlightRadarLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub spookfish-flightradar-layer-${Environment}
      Description: FlightRadarAPI and common dependencies
      ContentUri: ./layers/flightradar/
      CompatibleRuntimes:
        - python3.11
    Metadata:
      BuildMethod: python3.11

  # Nearby Flights Function
  NearbyFlightsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub spookfish-nearby-flights-${Environment}
      CodeUri: ../lambda/nearby_flights/
      Handler: handler.lambda_handler
      Layers:
        - !Ref FlightRadarLayer
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UserPreferencesTable
      Events:
        NearbyFlightsApi:
          Type: Api
          Properties:
            RestApiId: !Ref SpookfishApi
            Path: /flights/nearby
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer

  # User Preferences Function
  UserPreferencesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub spookfish-user-preferences-${Environment}
      CodeUri: ../lambda/user_preferences/
      Handler: handler.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserPreferencesTable
      Events:
        GetPreferences:
          Type: Api
          Properties:
            RestApiId: !Ref SpookfishApi
            Path: /user/preferences
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
        UpdatePreferences:
          Type: Api
          Properties:
            RestApiId: !Ref SpookfishApi
            Path: /user/preferences
            Method: PUT
            Auth:
              Authorizer: CognitoAuthorizer

  # User Locations Function
  UserLocationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub spookfish-user-locations-${Environment}
      CodeUri: ../lambda/user_locations/
      Handler: handler.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserLocationsTable
      Events:
        GetLocations:
          Type: Api
          Properties:
            RestApiId: !Ref SpookfishApi
            Path: /user/locations
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
        CreateLocation:
          Type: Api
          Properties:
            RestApiId: !Ref SpookfishApi
            Path: /user/locations
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
        DeleteLocation:
          Type: Api
          Properties:
            RestApiId: !Ref SpookfishApi
            Path: /user/locations/{locationId}
            Method: DELETE
            Auth:
              Authorizer: CognitoAuthorizer

  # ============================================================================
  # API Gateway
  # ============================================================================

  SpookfishApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub spookfish-api-${Environment}
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
        MaxAge: "'600'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt SpookfishUserPool.Arn

# ============================================================================
# Outputs
# ============================================================================

Outputs:
  # Cognito Outputs
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref SpookfishUserPool
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolId

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref SpookfishUserPoolClient
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolClientId

  UserPoolArn:
    Description: Cognito User Pool ARN
    Value: !GetAtt SpookfishUserPool.Arn
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolArn

  # API Gateway Outputs
  ApiGatewayUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${SpookfishApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub ${AWS::StackName}-ApiUrl

  ApiGatewayId:
    Description: API Gateway ID
    Value: !Ref SpookfishApi
    Export:
      Name: !Sub ${AWS::StackName}-ApiId

  # DynamoDB Outputs
  UserPreferencesTableName:
    Description: User Preferences Table Name
    Value: !Ref UserPreferencesTable
    Export:
      Name: !Sub ${AWS::StackName}-UserPreferencesTable

  UserLocationsTableName:
    Description: User Locations Table Name
    Value: !Ref UserLocationsTable
    Export:
      Name: !Sub ${AWS::StackName}-UserLocationsTable

  # Lambda Outputs
  NearbyFlightsFunctionArn:
    Description: Nearby Flights Lambda Function ARN
    Value: !GetAtt NearbyFlightsFunction.Arn
    Export:
      Name: !Sub ${AWS::StackName}-NearbyFlightsFunction

  # Region
  Region:
    Description: AWS Region
    Value: !Ref AWS::Region
    Export:
      Name: !Sub ${AWS::StackName}-Region
